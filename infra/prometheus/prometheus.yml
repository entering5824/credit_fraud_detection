global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers: []

# ── Alert rules (inline) ────────────────────────────────────────────────────
rule_files: []

scrape_configs:
  - job_name: "fraud-agent-api"
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
